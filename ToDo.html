<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ToDoリスト</title>
<style>
  body { font-family: sans-serif; margin: 1rem; display: flex; flex-direction: column; align-items: center; }
  #today-display { font-weight: bold; font-size: 30px; text-align: center; margin-bottom: 0.5rem; user-select: none; }
  .tab-buttons { margin-bottom: 1rem; }
  .tab-buttons button { font-size: 18px; padding: 0.5rem 1rem; margin-right: 0.5rem; cursor: pointer; border: 1px solid #333; background: white; border-radius: 5px; }
  .tab-buttons button.active { background: #333; color: white; }
  .container { display: flex; gap: 1rem; width: 100%; max-width: 1200px; }
  .pane { flex: 1; min-width: 300px; border: 1px solid #ccc; padding: 1rem; box-sizing: border-box; height: 80vh; overflow-y: auto; }
  #form-section form { font-size: 18px; line-height: 1.6; display: flex; flex-direction: column; gap: 1rem; }
  #form-section label { display: flex; flex-direction: column; }
  #form-section input[type="date"], #form-section select, #form-section textarea { font-size: 18px; padding: 0.6rem 0.8rem; box-sizing: border-box; width: 100%; }
  #form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  #form-header h2 { margin: 0; font-size: 24px; }
  #form-header button { font-size: 18px; padding: 0.4rem 1rem; cursor: pointer; }
  #todo-list { list-style: none; padding: 0; margin: 0; }
  #todo-list li { padding: 0.5rem 0.3rem; border-bottom: 1px solid #ccc; font-size: 18px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  #todo-list li.today { background-color: #ffe4e1; }
  #todo-list li.done, #todo-list li.cancelled { background-color: #dcdcdc; }
  #todo-list .text-block { flex-grow: 1; display: flex; flex-direction: column; }
  #todo-list .text-block.date { font-weight: bold; font-size: 16px; }
  #todo-list .text-block.title.cancelled { text-decoration: line-through; color: #888; }
  button.update-btn, button.edit-btn, button.delete-btn { font-size: 0.8rem; padding: 0.3rem 0.5rem; cursor: pointer; user-select: none; }
  button.edit-btn, button.delete-btn { margin-left: 0.3rem; }

  .update-btn[data-tooltip] { position: relative; }
  .update-btn[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 0;
    top: 120%;
    z-index: 10;
    padding: 8px 10px;
    border: 1px solid #ccc;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    border-radius: 6px;
    white-space: pre;
    font-size: 12px;
    line-height: 1.4;
    color: #333;
    min-width: 220px;
  }

  /* 保存状態バー */
  #save-status {
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    min-height: 24px;
    text-align: center;
    transition: opacity 0.5s;
  }
  #save-status.saving { background: #fff3cd; color: #856404; }
  #save-status.saved  { background: #d4edda; color: #155724; }
  #save-status.error  { background: #f8d7da; color: #721c24; }
  #save-status.loading { background: #cce5ff; color: #004085; }
</style>
</head>
<body>

<div id="today-display"></div>
<div id="save-status" class="loading">データを読み込み中...</div>

<div class="tab-buttons">
  <button id="tab-upcoming" class="active">今後の予定</button>
  <button id="tab-past">過去の予定</button>
</div>

<div class="container">
  <section id="form-section" class="pane">
    <div id="form-header">
      <h2 id="form-title">ToDo作成</h2>
      <div>
        <button id="addBtn" form="todo-form" type="submit">追加</button>
        <button id="cancelEditBtn" style="display:none; margin-left: 10px;">キャンセル</button>
      </div>
    </div>
    <form id="todo-form">
      <label>
        日付:
        <div style="display:flex; gap:5px; align-items:center;">
          <input type="date" id="todo-date" required />
          <button type="button" id="undecidedBtn">未定</button>
        </div>
      </label>
      <label>
        タイトル:
        <select id="todo-title" required>
          <option value="">選択してください</option>
          <option value="Tier2">Tier2</option>
          <option value="Tier2引き継ぎ">Tier2引き継ぎ</option>
          <option value="業務⑦">業務⑦</option>
          <option value="業務⑦引き継ぎ">業務⑦引き継ぎ</option>
          <option value="NWリプレース">NWリプレース</option>
          <option value="NWリプレース引き継ぎ">NWリプレース引き継ぎ</option>
          <option value="代替機作成">代替機作成</option>
          <option value="雑用">雑用</option>
          <option value="教育">教育</option>
          <option value="メモ">メモ</option>
          <option value="その他">その他</option>
        </select>
      </label>
      <label style="flex-direction:row; align-items:center; gap:30px;">
        <span>内容:</span>
        <button type="button" id="insertDateTimeBtn">日時挿入</button>
      </label>
      <textarea id="todo-content" rows="5"></textarea>
      <label>
        ステータス:
        <select id="todo-status" required>
          <option value="未着手">未着手</option>
          <option value="作業中">作業中</option>
          <option value="引き継ぎ">引き継ぎ</option>
          <option value="完了">完了</option>
          <option value="中止">中止</option>
        </select>
      </label>
    </form>
  </section>

  <section id="list-section" class="pane">
    <h2 id="list-title">今後の予定</h2>
    <ul id="todo-list"></ul>
  </section>
</div>

<script>
  // ── ストレージキー ──────────────────────────────
  const STORAGE_KEY = "todo_data";

  // ── 状態 ────────────────────────────────────────
  let todos = [];
  let editIndex = -1;
  let isUndecided = false;
  let currentTab = "upcoming";
  const statuses = ["未着手", "作業中", "引き継ぎ", "完了", "中止"];
  const UNDECIDED_DATE = "2100-01-01";
  const todayISO = new Date().toISOString().slice(0, 10);
  const dateInput = document.getElementById("todo-date");

  // ── ステータスバー ───────────────────────────────
  function setStatus(msg, cls) {
    const el = document.getElementById("save-status");
    el.textContent = msg;
    el.className = cls;
  }

  // ── サーバー保存 ─────────────────────────────────
  async function saveTodos() {
    setStatus("保存中...", "saving");
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(todos));
      if (!result) throw new Error("保存失敗");
      setStatus("✓ サーバーに保存済み", "saved");
      // 3秒後にメッセージを薄くする
      setTimeout(() => {
        const el = document.getElementById("save-status");
        el.style.opacity = "0.4";
      }, 3000);
    } catch (e) {
      setStatus("⚠ 保存失敗。ローカルに退避します。", "error");
      localStorage.setItem(STORAGE_KEY + "_backup", JSON.stringify(todos));
    }
  }

  // ── サーバー読み込み ─────────────────────────────
  async function loadTodos() {
    setStatus("データを読み込み中...", "loading");
    try {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) {
        todos = JSON.parse(result.value);
      } else {
        // サーバーにデータなし → localStorageのデータを移行
        const legacy = localStorage.getItem("todos");
        if (legacy) {
          todos = JSON.parse(legacy);
          setStatus("旧データを移行中...", "saving");
          await saveTodos();
          localStorage.removeItem("todos");
        } else {
          todos = [];
        }
      }
      setStatus("✓ 読み込み完了", "saved");
      setTimeout(() => {
        const el = document.getElementById("save-status");
        el.style.opacity = "0.4";
      }, 2000);
    } catch (e) {
      // サーバーアクセス失敗 → localStorageにフォールバック
      const fallback = localStorage.getItem("todos") || localStorage.getItem(STORAGE_KEY + "_backup");
      todos = fallback ? JSON.parse(fallback) : [];
      setStatus("⚠ サーバー接続失敗。ローカルデータを使用中。", "error");
    }
    renderTodoList();
  }

  // ── UI ──────────────────────────────────────────
  function setUndecidedMode(on) {
    isUndecided = on;
    if (on) {
      dateInput.value = "";
      dateInput.removeAttribute("required");
    } else {
      dateInput.setAttribute("required", "");
    }
  }

  function updateTodayDisplay() {
    const today = new Date();
    const y = today.getFullYear(), m = today.getMonth() + 1, d = today.getDate();
    const weekNames = ["日","月","火","水","木","金","土"];
    const w = weekNames[today.getDay()];
    const reiwaYear = y - 2018;
    const td = document.getElementById("today-display");
    td.textContent = `${y}年(令和${reiwaYear}年)${m}月${d}日（`;
    const span = document.createElement("span"); span.textContent = w;
    if (w === "日") span.style.color = "red";
    else if (w === "土") span.style.color = "blue";
    td.appendChild(span); td.appendChild(document.createTextNode("）"));
  }

  function renderTodoList() {
    const todoList = document.getElementById("todo-list");
    todoList.innerHTML = "";
    let filtered = (currentTab === "upcoming")
      ? todos.filter(t => t.date >= todayISO).sort((a, b) => a.date.localeCompare(b.date))
      : todos.filter(t => t.date < todayISO).sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById("list-title").textContent = (currentTab === "upcoming") ? "今後の予定" : "過去の予定";

    filtered.forEach(t => {
      const li = document.createElement("li");
      if (t.date === todayISO) li.classList.add("today");
      if (t.status === "完了") li.classList.add("done");
      if (t.status === "中止") li.classList.add("cancelled");

      const textBlock = document.createElement("div"); textBlock.className = "text-block";
      const dateDiv = document.createElement("div"); dateDiv.className = "date";
      dateDiv.textContent = `${t.date === UNDECIDED_DATE ? "日程未定" : t.date} [${t.status}]`;

      const titleDiv = document.createElement("div"); titleDiv.className = "title";
      if (t.status === "中止") titleDiv.classList.add("cancelled");
      let firstLine = t.content.split(/\r?\n/)[0] || "";
      titleDiv.textContent = `【${t.title}】 ${firstLine}`;

      const contentDiv = document.createElement("div"); contentDiv.textContent = t.content;
      contentDiv.style.display = "none"; contentDiv.style.marginTop = "0.3rem"; contentDiv.style.whiteSpace = "pre-wrap";
      titleDiv.onclick = () => contentDiv.style.display = (contentDiv.style.display === "none") ? "block" : "none";

      textBlock.append(dateDiv, titleDiv, contentDiv);

      const updateBtn = document.createElement("button");
      updateBtn.textContent = "[更新]";
      updateBtn.className = "update-btn";
      updateBtn.setAttribute("data-tooltip", "ステータスを変更します\n未着手＞作業中＞引き継ぎ＞完了＞中止");
      updateBtn.onclick = async () => {
        const idx = todos.indexOf(t);
        todos[idx].status = statuses[(statuses.indexOf(t.status) + 1) % statuses.length];
        await saveTodos();
        renderTodoList();
      };

      const editBtn = document.createElement("button"); editBtn.textContent = "[編集]";
      editBtn.className = "edit-btn";
      editBtn.onclick = () => startEdit(todos.indexOf(t));

      const deleteBtn = document.createElement("button"); deleteBtn.textContent = "[削除]";
      deleteBtn.className = "delete-btn";
      deleteBtn.onclick = async () => {
        if (confirm("削除してもよろしいですか？")) {
          todos.splice(todos.indexOf(t), 1);
          await saveTodos();
          renderTodoList();
        }
      };

      li.append(updateBtn, editBtn, deleteBtn, textBlock);
      todoList.appendChild(li);
    });
  }

  function startEdit(i) {
    editIndex = i;
    const t = todos[i];
    if (t.date === UNDECIDED_DATE) {
      setUndecidedMode(true);
    } else {
      setUndecidedMode(false);
      dateInput.value = t.date;
    }
    document.getElementById("todo-title").value = t.title;
    document.getElementById("todo-content").value = t.content;
    document.getElementById("todo-status").value = t.status;
    document.getElementById("form-title").textContent = "ToDo編集";
    document.getElementById("addBtn").textContent = "更新";
    document.getElementById("cancelEditBtn").style.display = "inline-block";
  }

  document.getElementById("cancelEditBtn").onclick = () => {
    editIndex = -1;
    setUndecidedMode(false);
    document.getElementById("todo-form").reset();
    document.getElementById("form-title").textContent = "ToDo作成";
    document.getElementById("addBtn").textContent = "追加";
    document.getElementById("cancelEditBtn").style.display = "none";
  };

  dateInput.addEventListener("input", () => {
    if (dateInput.value) setUndecidedMode(false);
  });

  document.getElementById("todo-form").onsubmit = async e => {
    e.preventDefault();
    let date = dateInput.value;
    if (isUndecided) date = UNDECIDED_DATE;
    const title = document.getElementById("todo-title").value;
    const content = document.getElementById("todo-content").value;
    const status = document.getElementById("todo-status").value;
    if (editIndex === -1) {
      todos.push({ date, title, content, status });
    } else {
      todos[editIndex] = { date, title, content, status };
      editIndex = -1;
      document.getElementById("form-title").textContent = "ToDo作成";
      document.getElementById("addBtn").textContent = "追加";
      document.getElementById("cancelEditBtn").style.display = "none";
    }
    await saveTodos();
    setUndecidedMode(false);
    document.getElementById("todo-form").reset();
    renderTodoList();
  };

  document.getElementById("tab-upcoming").onclick = () => { currentTab = "upcoming"; renderTodoList(); };
  document.getElementById("tab-past").onclick = () => { currentTab = "past"; renderTodoList(); };
  document.getElementById("undecidedBtn").onclick = () => setUndecidedMode(true);

  document.getElementById("insertDateTimeBtn").onclick = () => {
    const textarea = document.getElementById("todo-content");
    const now = new Date();
    const txt = `[${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")}  ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}]`;
    const start = textarea.selectionStart;
    textarea.value = textarea.value.slice(0, start) + txt + textarea.value.slice(textarea.selectionEnd);
    textarea.selectionStart = textarea.selectionEnd = start + txt.length;
    textarea.focus();
  };

  // ── 起動 ────────────────────────────────────────
  updateTodayDisplay();
  loadTodos();
</script>
</body>
</html>
